<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DOBERTO VCF — Admin</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="topbar">
  <a href="/" class="brand"><span class="dot"></span> DOBERTO VCF</a>
  <div class="nav-links">
    <a href="index.html">Anrejistre</a>
    <a href="list.html">Lis moun</a>
  </div>
</div>

<div class="container">

  <div id="loginPanel" class="panel">
    <h3 style="margin-top:0">Koneksyon Admin</h3>
    <label for="pw">Modpas admin</label>
    <input id="pw" type="password" required />
    <button id="loginBtn">Konekte</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <div id="adminPanel" class="panel" style="display:none">
    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap">
      <h3 style="margin:0">Tout moun ki enskri</h3>
      <button class="secondary" id="logoutBtn" style="width:auto; margin:0">Dekonekte</button>
    </div>

    <input id="searchBox" placeholder="Chèche pa non..." style="margin-top:16px" />

    <table>
      <thead><tr><th>Non</th><th>Email</th><th>Peyi</th><th>Nimewo</th></tr></thead>
      <tbody id="adminBody"></tbody>
    </table>

    <div class="pager">
      <button class="secondary" id="aPrev">← Anvan</button>
      <span class="badge" id="aPageInfo"></span>
      <button class="secondary" id="aNext">Apre →</button>
    </div>

    <button id="exportBtn" style="margin-top:24px">Ekspòte tout an CSV</button>
  </div>

  <p class="footer-note">DOBERTO VCF — Zòn admin sèlman. Aksè restrenn.</p>
</div>

<script src="js/admin.js"></script>
</body>
</html>
