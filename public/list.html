<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DOBERTO VCF — Lis moun enskri</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="topbar">
  <a href="/" class="brand"><span class="dot"></span> DOBERTO VCF</a>
  <div class="topbar-right">
    <div class="nav-links">
      <a href="index.html" data-i18n="nav_register">Anrejistre</a>
      <a href="admin.html" data-i18n="nav_admin">Admin</a>
    </div>
    <select id="langSelect" class="lang-select">
      <option value="ht">KR</option>
      <option value="en">EN</option>
      <option value="fr">FR</option>
    </select>
  </div>
</div>

<div class="container">
  <div class="hero">
    <h1><span data-i18n="list_title_1">Moun ki</span> <span style="color:var(--signal)" data-i18n="list_title_2">deja enskri</span></h1>
    <p data-i18n="list_desc">Pou pwoteje vi prive tout moun, nimewo yo pa afiche isit la — sèlman non yo.</p>
  </div>

  <div class="panel">
    <div class="table-scroll">
      <table>
        <thead><tr><th data-i18n="th_name">Non</th><th data-i18n="th_country">Peyi</th></tr></thead>
        <tbody id="listBody"></tbody>
      </table>
    </div>
    <div class="pager">
      <button class="secondary" id="prevBtn" data-i18n="pager_prev">← Anvan</button>
      <span class="badge" id="pageInfo"></span>
      <button class="secondary" id="nextBtn" data-i18n="pager_next">Apre →</button>
    </div>
  </div>

  <div class="panel">
    <h3 style="margin-top:0" data-i18n="dl_title">Download fichye VCF la</h3>
    <p class="hint" id="dlDescText" style="margin-bottom:16px"></p>
    <form id="dlForm">
      <label for="dlName" data-i18n="label_dl_name">Non ou te anrejistre a</label>
      <input id="dlName" type="text" required />

      <label data-i18n="label_dl_phone">Nimewo ou te anrejistre a</label>
      <div class="phone-row">
        <select id="dlDial"></select>
        <input id="dlPhone" type="tel" inputmode="numeric" required />
      </div>

      <button type="submit" id="dlBtn" data-i18n="btn_verify">Verifye &amp; Download</button>
      <div class="msg" id="dlMsg"></div>
    </form>
  </div>

  <p class="footer-note" data-i18n="footer_note">DOBERTO VCF — Fèt pa Doberto Mr Lit.</p>
</div>

<script src="js/i18n.js"></script>
<script src="js/countries.js"></script>
<script src="js/list.js"></script>
</body>
</html>
